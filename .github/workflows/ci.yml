name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm run test

      - name: RLS policy lint (SSOT 정합)
        run: npx tsx scripts/check-rls-policies.ts

      - name: RBAC guard lint (service_role 우회 검출)
        run: npx tsx scripts/check-rbac-guards.ts

      - name: Build
        run: npm run build
        env:
          # 빌드 시 필요한 더미 env (실제 키는 Vercel/배포 환경에서)
          NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder-anon-key
          SUPABASE_SERVICE_ROLE_KEY: placeholder-service-role-key
